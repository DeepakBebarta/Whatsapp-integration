version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: axension_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    container_name: axension_worker
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  celery_beat:
    build: .
    container_name: axension_beat
    command: celery -A src.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  webhook:
    build: .
    container_name: axension_webhook
    command: uvicorn src.whatsapp.webhook:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
